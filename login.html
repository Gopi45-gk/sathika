    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-underline {
            position: relative;
        }
        .input-underline::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: theme('colors.secondary');
            transition: width 0.3s ease-in-out;
        }
        .input-underline:focus-within::after {
            width: 100%;
        }
        .glass-panel {
            background: rgba(254, 248, 242, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 224, 136, 0.3);
            box-shadow: 0 8px 32px 0 rgba(90, 15, 28, 0.04);
        }
        .maroon-shadow {
            box-shadow: 0 4px 20px rgba(90, 15, 28, 0.15);
        }
        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            z-index: 100;
            transition: transform 0.4s ease-out, opacity 0.4s ease-out;
            opacity: 0;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        /* Smooth form transition */
        .form-view {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .form-view.hidden-view {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
        }
        .form-view.active-view {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            position: relative;
        }
    </style>

<script>
    // ========== View Toggle ==========
    const loginView = document.getElementById('login-view');
    const signupView = document.getElementById('signup-view');
    const formTitle = document.getElementById('form-title');
    const formSubtitle = document.getElementById('form-subtitle');
    const showSignupLink = document.getElementById('show-signup-link');
    const showLoginLink = document.getElementById('show-login-link');

    function showView(view) {
        if (view === 'signup') {
            loginView.classList.remove('active-view');
            loginView.classList.add('hidden-view');
            signupView.classList.remove('hidden-view');
            signupView.classList.add('active-view');
            formTitle.textContent = 'Create Account';
            formSubtitle.textContent = 'Begin your heritage journey';
        } else {
            signupView.classList.remove('active-view');
            signupView.classList.add('hidden-view');
            loginView.classList.remove('hidden-view');
            loginView.classList.add('active-view');
            formTitle.textContent = 'Welcome Back';
            formSubtitle.textContent = 'Sign in to continue your journey';
        }
    }

    showSignupLink.addEventListener('click', (e) => {
        e.preventDefault();
        showView('signup');
    });

    showLoginLink.addEventListener('click', (e) => {
        e.preventDefault();
        showView('login');
    });

    // ========== Toast Notification ==========
    let toastTimeout = null;

    function showToast(message, type = 'error') {
        const toast = document.getElementById('toast');
        const toastInner = document.getElementById('toast-inner');
        const toastIcon = document.getElementById('toast-icon');
        const toastMessage = document.getElementById('toast-message');

        toastMessage.textContent = message;

        if (type === 'error') {
            toastInner.className = 'flex items-center gap-2 px-5 py-3 rounded-lg shadow-lg text-sm font-body-md bg-error-container text-on-error-container';
            toastIcon.textContent = 'error';
        } else if (type === 'success') {
            toastInner.className = 'flex items-center gap-2 px-5 py-3 rounded-lg shadow-lg text-sm font-body-md bg-tertiary-container text-on-tertiary-container';
            toastIcon.textContent = 'check_circle';
        } else {
            toastInner.className = 'flex items-center gap-2 px-5 py-3 rounded-lg shadow-lg text-sm font-body-md bg-surface-container-high text-on-surface';
            toastIcon.textContent = 'info';
        }

        toast.classList.add('show');

        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 4000);
    }

    // ========== Password Toggle ==========
    function togglePasswordVisibility(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('.material-symbols-outlined');
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = 'visibility';
        } else {
            input.type = 'password';
            icon.textContent = 'visibility_off';
        }
    }

    // ========== Button Loading State ==========
    function setButtonLoading(btn, loading) {
        if (loading) {
            btn.disabled = true;
            btn.dataset.originalHtml = btn.innerHTML;
