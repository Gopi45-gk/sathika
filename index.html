<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&family=EB+Garamond:ital,wght@0,500;1,500&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">

                        "on-primary-fixed": "#40000d",

                        "on-secondary": "#ffffff",

                        "on-surface-variant": "#554243",
                        "secondary-fixed": "#ffe088",
                        "on-tertiary-fixed": "#211b00",
                        "on-primary-fixed-variant": "#7d2a34",
                        "surface": "#fef8f2",
                        "secondary-container": "#fed65b",
                        "tertiary-fixed-dim": "#d4c78f",
                        "outline-variant": "#dbc0c1",
                        "primary-fixed": "#ffdadb",
                        "on-tertiary-fixed-variant": "#4f471b",
                        "inverse-primary": "#ffb2b6",
                        "surface-container-low": "#f8f3ed",
                        "on-background": "#1d1b18",
                        "background": "#fef8f2",
                        "error": "#ba1a1a",
                        "on-primary-container": "#de757d",
                        "secondary": "#735c00",
                        "surface-variant": "#e7e2dc",
                        "on-error": "#ffffff",
                        "surface-bright": "#fef8f2",
                        "primary-fixed-dim": "#ffb2b6",
                        "surface-container-high": "#ede7e1",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#574500",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e7e2dc",
                        "on-error-container": "#93000a",
                        "surface-dim": "#dfd9d3",
                        "tertiary-container": "#b8ac76",
                        "tertiary-fixed": "#f1e3a9",
                        "surface-container": "#f3ede7",
                        "secondary-fixed-dim": "#e9c349",
                        "on-secondary-fixed": "#241a00",
                        "inverse-on-surface": "#f6f0ea",
                        "tertiary": "#685e31",
                        "on-secondary-container": "#745c00",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#3a000b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"

                    "spacing": {
                        "margin-mobile": "20px",
                        "margin-desktop": "64px",
                        "gutter": "24px",
                        "section-gap": "120px",
                        "unit": "8px",
                        "container-max": "1280px"
                    },
                    "fontFamily": {
                        "body-lg": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],
                        "subheading-lg": ["EB Garamond"],
                        "headline-lg": ["Playfair Display"],
                        "headline-lg-mobile": ["Playfair Display"],
                        "display-lg": ["Playfair Display"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "subheading-lg": ["24px", { "lineHeight": "32px", "fontWeight": "500" }],
                        "headline-lg": ["48px", { "lineHeight": "56px", "fontWeight": "600" }],

                        "display-lg": ["64px", { "lineHeight": "72px", "letterSpacing": "-0.02em", "fontWeight": "700" }]

            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .bg-silk-texture {
            background-color: #5a0f1c; /* primary-container */
            background-image:
                radial-gradient(circle at 50% 50%, rgba(125, 42, 52, 0.4) 0%, transparent 60%),
                linear-gradient(135deg, rgba(58, 0, 11, 0.8) 0%, rgba(90, 15, 28, 0.9) 50%, rgba(58, 0, 11, 0.8) 100%);
        }

        .gold-shimmer {
            background: linear-gradient(90deg, transparent 0%, rgba(255, 224, 136, 0.4) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .particle {
            position: absolute;
            background: #ffe088; /* secondary-fixed */
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(255, 224, 136, 0.8);
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            80% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-20vh) scale(1.5);
                opacity: 0;
            }
        }

        .fade-in-element {
            opacity: 0;
            animation: fadeIn 1.5s ease-out forwards;
        }

        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 1s; }
        .delay-3 { animation-delay: 1.5s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="font-body-md antialiased selection:bg-secondary-fixed selection:text-on-secondary-fixed">
    <div id="splash-view" class="bg-primary-container text-on-primary fixed inset-0 z-50 overflow-hidden flex flex-col items-center justify-center bg-silk-texture px-margin-mobile md:px-margin-desktop">
        <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none" id="particles-container"></div>
        <div class="relative z-10 flex flex-col items-center justify-center text-center max-w-container-max mx-auto w-full">
            <div class="fade-in-element delay-1 mb-8">
                <img alt="Satika Logo" class="w-auto object-contain mx-auto h-48 md:h-64" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAdL1hBgCz_GbXr38A6NqidoAqpRTL2k6lMmdBBwttjfvXyYYtYP30T_hL0SB4kUkuViq0U34phTMT6kI898aU2kPwXnLgtqand0vo7VXAiVr9JUrXfwTixQZYXvBw1AF2O_6O6lplaoXJyAKgtwaFM6ijkxb0U8v5mUqbzve-CIvveLuDBxDgDNDPY_PgwTTN3b2MZ2CKV5EVodFxUYgg4R_JHnkoRY1rGJrSU-NrdbnktOmEpGMCTqkYDByavUamea4tDRlJfpgo">
            </div>
            <h1 class="fade-in-element delay-2 font-display-lg text-display-lg text-secondary-fixed mb-4 tracking-wider"><br></h1>
            <p class="fade-in-element delay-3 font-subheading-lg text-subheading-lg text-tertiary-fixed-dim italic font-light tracking-wide max-w-md">
                Elegance Woven Into Every Thread
            </p>
            <div class="fade-in-element delay-3 mt-16 w-64 h-[2px] bg-primary-fixed-variant/30 rounded-full overflow-hidden relative">
                <div class="absolute top-0 left-0 h-full w-full bg-secondary-fixed gold-shimmer rounded-full transform origin-left transition-transform duration-1000 ease-in-out" id="loading-bar" style="transform: scaleX(0);"></div>
            </div>
        </div>
        <div class="absolute inset-0 z-0 pointer-events-none bg-gradient-to-t from-primary/50 to-transparent"></div>
    </div>

    <script>
        // Particle Generation
        const container = document.getElementById('particles-container');
        const particleCount = 60;

        for (let i = 0; i < particleCount; i++) {
            createParticle();
        }

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');

            // Random properties
            const size = Math.random() * 4 + 2; // 2px to 6px
            const left = Math.random() * 100; // 0% to 100%
            const duration = Math.random() * 5 + 5; // 5s to 10s
            const delay = Math.random() * 5; // 0s to 5s

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${left}%`;
            particle.style.animation = `float-up ${duration}s ease-in-out ${delay}s infinite`;

            container.appendChild(particle);
        }

        // Loading Bar Animation Simulation
        document.addEventListener('DOMContentLoaded', () => {
            const loadingBar = document.getElementById('loading-bar');
            let progress = 0;

            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    // Redirect to login page after loading completes
                    setTimeout(() => { window.location.href = 'login.html'; }, 500);
                }
                loadingBar.style.transform = `scaleX(${progress / 100})`;
            }, 300);
        });
    </script>
</body>
</html>
