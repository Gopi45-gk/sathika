<body class="antialiased font-body-md flex flex-col min-h-screen">

            <nav class="hidden md:flex gap-8">
                <a class="text-on-surface hover:text-secondary font-semibold" href="collections.html">Collections</a>
                </nav>
            <div class="flex gap-4 text-primary">
                <a href="cart.html" class="relative">
                    <span class="material-symbols-outlined">shopping_bag</span>
                    <span class="cart-badge absolute -top-2 -right-2 bg-secondary text-on-secondary text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center" style="display:none;">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="flex-grow pt-32 pb-16 px-4 md:px-16 max-w-7xl mx-auto w-full">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-12">
            <!-- Images (Left 7 cols) -->
            <div class="md:col-span-7 flex flex-col-reverse md:flex-row gap-4">
                <div class="flex md:flex-col gap-4 overflow-x-auto md:w-24 shrink-0">
                    <img id="thumb-1" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBfpmEPjG0m5ZviLgl59uEfVvBM0H2FYlpjVrdm-C2lXzA-LCQmlbb7Dohc2bU1yU4uJKDMjbAAtp6AKNEQOXV0evJMUIGQFwS8CuMTVyEFKRqc9c8Gf753IpOwKEBnS2WtZC9Kso9oKthor4fNRS0RAd5_tuGDXgUlIp_ZqbGZA4xlMfvhKN7JjeImA2Z_KxVek-BX3S61K6NqEJCNZ-CcM44gppXRdEyO1QP4aYOeG5B7GgljVOj53iwXxgZuIUVevFtqs6ol3WM" class="w-20 md:w-24 h-24 md:h-32 object-cover border-2 border-primary cursor-pointer">
                </div>
                <div class="flex-grow relative bg-surface-container-low rounded-lg overflow-hidden">
                    <img id="main-image" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBfpmEPjG0m5ZviLgl59uEfVvBM0H2FYlpjVrdm-C2lXzA-LCQmlbb7Dohc2bU1yU4uJKDMjbAAtp6AKNEQOXV0evJMUIGQFwS8CuMTVyEFKRqc9c8Gf753IpOwKEBnS2WtZC9Kso9oKthor4fNRS0RAd5_tuGDXgUlIp_ZqbGZA4xlMfvhKN7JjeImA2Z_KxVek-BX3S61K6NqEJCNZ-CcM44gppXRdEyO1QP4aYOeG5B7GgljVOj53iwXxgZuIUVevFtqs6ol3WM" class="w-full h-full object-cover">
                </div>
            </div>

            <!-- Details (Right 5 cols) -->
            <div class="md:col-span-5 space-y-6">
                <div>
                    <p id="prod-category" class="font-label-sm text-secondary uppercase mb-2">Banarasi Silk</p>
                    <h1 id="prod-title" class="font-display-lg text-4xl text-primary mb-2">Maroon Majesty</h1>
                    <div class="flex items-center gap-2 mb-4">
                        <div class="flex text-secondary text-lg">
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
                        </div>
                        <span class="text-on-surface-variant text-sm">(4.9)</span>
                    </div>
                    <div class="flex items-end gap-3">
                        <span id="prod-price" class="text-3xl text-on-surface font-semibold">₹34,500</span>
                    </div>
                </div>

                <p id="prod-desc" class="text-on-surface-variant leading-relaxed">
                    A timeless classic. This handwoven Banarasi silk saree features intricate zari work and traditional motifs, taking over 120 hours to weave by master artisans.
                </p>

                <div class="pt-6 border-t border-secondary/20">
                    <p class="font-semibold text-on-surface mb-3">Quantity</p>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center border border-outline rounded-lg overflow-hidden w-32">
                            <button onclick="changeQty(-1)" class="px-3 py-2 text-primary hover:bg-surface-variant">-</button>
                            <input type="text" id="qty-input" value="1" readonly class="w-full text-center border-none bg-transparent focus:ring-0">
                            <button onclick="changeQty(1)" class="px-3 py-2 text-primary hover:bg-surface-variant">+</button>
                        </div>
                    </div>
                </div>

                <div class="pt-6 flex flex-col gap-4">
                    <button id="add-to-cart-btn" class="w-full bg-primary text-on-primary py-4 rounded-lg font-semibold tracking-wide hover:bg-primary/90 transition-colors uppercase">
                        Add to Cart
                    </button>
                    <button id="buy-now-btn" class="w-full bg-transparent border border-primary text-primary py-4 rounded-lg font-semibold tracking-wide hover:bg-primary hover:text-on-primary transition-colors uppercase">
                        Buy it Now
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentProduct = null;

        document.addEventListener('DOMContentLoaded', async () => {
            updateCartBadge();
            
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (id) {
                try {
                    currentProduct = await getProductById(id);
                } catch (e) {
                    console.error('Error fetching product:', e);
                }
            }

            if (!currentProduct) {
                // Fallback
                currentProduct = {
                    id: 'fallback',
                    name: 'Maroon Majesty',
                    category: 'Banarasi Silk',
                    price: 34500,
                    description: 'A timeless classic. This handwoven Banarasi silk saree features intricate zari work and traditional motifs, taking over 120 hours to weave by master artisans.',
                    image: 'https://lh3.googleusercontent.com/aida-public/AB6AXuBfpmEPjG0m5ZviLgl59uEfVvBM0H2FYlpjVrdm-C2lXzA-LCQmlbb7Dohc2bU1yU4uJKDMjbAAtp6AKNEQOXV0evJMUIGQFwS8CuMTVyEFKRqc9c8Gf753IpOwKEBnS2WtZC9Kso9oKthor4fNRS0RAd5_tuGDXgUlIp_ZqbGZA4xlMfvhKN7JjeImA2Z_KxVek-BX3S61K6NqEJCNZ-CcM44gppXRdEyO1QP4aYOeG5B7GgljVOj53iwXxgZuIUVevFtqs6ol3WM'
                };
            }

            // Populate UI
            document.getElementById('prod-title').textContent = currentProduct.name;
            document.getElementById('prod-category').textContent = currentProduct.category;
            document.getElementById('prod-price').textContent = `₹${currentProduct.price.toLocaleString('en-IN')}`;
            document.getElementById('prod-desc').textContent = currentProduct.description || '';
            const imgSrc = currentProduct.images ? currentProduct.images[0] : currentProduct.image;
            document.getElementById('main-image').src = imgSrc;
            document.getElementById('thumb-1').src = imgSrc;

            document.getElementById('add-to-cart-btn').addEventListener('click', () => {
                const qty = parseInt(document.getElementById('qty-input').value, 10);
                addToCart(currentProduct, qty);
                alert("Added to cart!");
                updateCartBadge();
            });

            document.getElementById('buy-now-btn').addEventListener('click', () => {
                const qty = parseInt(document.getElementById('qty-input').value, 10);
                const buyNowItem = {
                    productId: currentProduct.id,
                    name: currentProduct.name,
                    price: currentProduct.price,
                    originalPrice: currentProduct.originalPrice || currentProduct.price,
                    image: currentProduct.images ? currentProduct.images[0] : currentProduct.imageUrl || currentProduct.image,
                    category: currentProduct.category,
                    quantity: qty
                };
                sessionStorage.setItem('buyNowItem', JSON.stringify(buyNowItem));
                window.location.href = 'checkout.html?buyNow=true';
            });
        });

        function changeQty(delta) {
            const el = document.getElementById('qty-input');
            let val = parseInt(el.value, 10) + delta;
            if(val < 1) val = 1;
            el.value = val;
        }
    </script>
</body>
</html>
